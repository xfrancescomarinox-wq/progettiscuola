<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.accordion {
  background-color: #eee;
  color: #444;
  cursor: pointer;
  padding: 18px;
  width: 100%;
  border: none;
  text-align: left;
  outline: none;
  font-size: 15px;
  transition: 0.4s;
}

.active, .accordion:hover {
  background-color: #ccc; 
}

.panel {
  padding: 0 18px;
  display: none;
  background-color: white;
  overflow: hidden;
}
</style>
</head>
<body>
<h2>File Index</h2>

<p>Benvenuto</p>

<button class="accordion">1 ─ La Probabilità</button>
<div class="panel">
  <a href="guida_probabilita.html">La Probabilità</a>
</div>

<button class="accordion">2 ─ La Piramide</button>
<div class="panel">
  <a href="piramide_manuale.html">La Piramide</a>  
</div>

<button class="accordion">Section 3</button>
<div class="panel">
  <p>Prossimo link</p>
</div>

<script>
var acc = document.getElementsByClassName("accordion");
var i;

for (i = 0; i < acc.length; i++) {
  acc[i].addEventListener("click", function() {
    this.classList.toggle("active");
    var panel = this.nextElementSibling;
    if (panel.style.display === "block") {
      panel.style.display = "none";
    } else {
      panel.style.display = "block";
    }
  });
}
</script>

</body>
</html>
